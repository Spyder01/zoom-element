<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom & Pan Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Zooming Demo</h1>
  <p>Use the buttons to zoom in, zoom out, or reset the image.</p>

  <div class="container">
    <img id="DemoImage"src="https://via.placeholder.com/400"alt="Demo Image">
  </div>

  <div class="buttons">
    <button onclick="zoomIn()">Zoom In</button>
    <button onclick="zoomOut()">Zoom Out</button>
    <button onclick="resetZoom()">Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
